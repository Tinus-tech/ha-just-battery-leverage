name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip custom_component
        run: |
          cd custom_components
          zip -r ../just_leverage_battery.zip just_leverage_battery/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: just_leverage_battery.zip
          generate_release_notes: true
